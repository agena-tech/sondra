SONDRA_MEMORY_DIR: store
SONDRA_MEMORY_LOG_DIR: logs

SONDRA_MEMORY_HYBRID_ENABLED: "1"
SONDRA_MEMORY_MMR_ENABLED: "1"
SONDRA_MEMORY_TEMPORAL_DECAY: "1"

SONDRA_MEMORY_EMBED_PROVIDER: local
SONDRA_MEMORY_EMBED_MODEL: nomic-embed-text
SONDRA_MEMORY_EMBED_BASE_URL: http://127.0.0.1:11434
SONDRA_MEMORY_EMBED_TIMEOUT_SEC: "3"
SONDRA_MEMORY_EMBED_DIM: "768"

SONDRA_MEMORY_MMR_LAMBDA: "0.72"
SONDRA_MEMORY_MAX_CANDIDATES: "1200"

SONDRA_MEMORY_QUERY_CACHE: "1"
SONDRA_MEMORY_QUERY_CACHE_TTL_SEC: "180"

SONDRA_MEMORY_SYNC_MODE: off
SONDRA_MEMORY_SYNC_INTERVAL_SEC: "90"
